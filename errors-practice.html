<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Practice · I miei errori</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface2: #f5f3ef;
    --border: #e8e4dc;
    --border2: #d0ccc4;
    --accent: #2e6a4e;
    --accent-light: #e8f4ee;
    --accent-dim: #a8c8b8;
    --text: #1a1814;
    --text2: #6a6560;
    --text3: #a8a49e;
    --green: #2a7a4a;
    --green-bg: #eaf5ee;
    --green-border: #b0d8be;
    --red: #c0392b;
    --red-bg: #fdf0ee;
    --red-border: #e8b0a8;
    --orange: #d4700a;
    --orange-bg: #fef3e8;
    --orange-border: #f0c088;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
    flex-wrap: wrap; gap: 10px;
  }
  .nav-title {
    font-family: 'Lora', serif;
    font-size: 18px; color: var(--accent); font-weight: 500;
  }
  .nav-subtitle { font-size: 13px; font-weight: 400; color: var(--text2); }
  .score-pill { font-size: 13px; color: var(--text2); display: flex; gap: 14px; align-items: center; }
  .score-pill span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 18px; height: 18px; border-radius: 50%; }
  .dot-g { background: #16a34a; }
  .dot-r { background: #dc2626; }
  .dot-o { background: #ea8c00; }

  .main { padding: 24px; max-width: 760px; margin: 0 auto; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 72px 24px;
    color: var(--text3); font-size: 15px;
  }
  .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 16px; }
  .empty-state a {
    color: var(--accent); text-decoration: none; font-weight: 500;
  }
  .empty-state a:hover { text-decoration: underline; }

  /* Controls */
  .quiz-controls {
    display: flex; gap: 10px; margin-bottom: 20px;
    flex-wrap: wrap; align-items: center;
  }
  .btn {
    padding: 8px 18px; border-radius: var(--radius);
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent); color: #fff;
    border-color: var(--accent); font-weight: 600;
  }
  .btn.primary:hover { background: #235a3f; border-color: #235a3f; }
  .btn.danger { border-color: var(--red-border); color: var(--red); }
  .btn.danger:hover { background: var(--red-bg); }

  .info-pill {
    font-size: 13px; color: var(--text3);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
  }
  .info-pill strong { color: var(--accent); }

  /* Progress */
  .progress-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Card */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .card-label { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .card-word-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .card-word { font-family: 'Lora', serif; font-size: 38px; color: var(--text); }
  .card-hint { font-size: 15px; color: var(--text3); margin-bottom: 22px; }

  .fields-grid { display: grid; gap: 12px; }
  .fields-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .fields-grid.one { grid-template-columns: 1fr; }

  .field-wrap { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }
  .field-input {
    padding: 12px 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 16px;
    outline: none; transition: border-color 0.2s;
    -webkit-user-select: text;
  }
  .field-input:focus { border-color: var(--accent); background: #fff; }
  .field-input.correct { border-color: #4caf7a; background: #e8f8ef; color: #1a6e3a; font-weight: 600; }
  .field-input.wrong { border-color: #e05555; background: #fdeaea; color: #c0392b; font-weight: 600; }
  .field-input:disabled { opacity: 1; cursor: default; }

  .answer-row { display: flex; gap: 10px; margin-top: 20px; align-items: center; flex-wrap: wrap; }
  .feedback-msg { font-size: 16px; font-weight: 500; flex: 1; min-height: 20px; }
  .feedback-msg.correct { color: var(--green); }
  .feedback-msg.wrong { color: var(--red); }

  .correct-answer {
    font-size: 15px; color: var(--text2); margin-top: 10px;
    padding: 12px 16px; background: var(--red-bg);
    border-radius: 8px; border-left: 3px solid var(--red-border);
  }
  .correct-answer strong { color: var(--red); }

  .fix-typo-wrap {
    margin-top: 10px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .fix-typo-label { font-size: 13px; color: var(--text3); }

  .audio-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border2); background: var(--surface2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .audio-btn:hover { border-color: var(--accent); }
  .audio-btn.playing { background: var(--accent); border-color: var(--accent); }
  .audio-btn svg { width: 12px; height: 12px; fill: var(--text2); }
  .audio-btn.playing svg { fill: #fff; }

  /* Error badge on card */
  .error-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600; color: var(--red);
    background: var(--red-bg); border: 1px solid var(--red-border);
    border-radius: 20px; padding: 3px 10px; margin-bottom: 14px;
  }

  /* Finished */
  .finished-card {
    text-align: center; padding: 48px 28px;
  }
  .finished-card .emoji { font-size: 52px; display: block; margin-bottom: 16px; }
  .finished-card .title { font-family: 'Lora', serif; font-size: 26px; color: var(--text); margin-bottom: 8px; }
  .finished-card .subtitle { font-size: 15px; color: var(--text2); margin-bottom: 28px; }
  .finished-card .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text3); text-decoration: none;
    margin-top: 24px;
  }
  .back-link:hover { color: var(--accent); }

  @media (max-width: 560px) {
    .fields-grid.three { grid-template-columns: 1fr; }
    .card-word { font-size: 24px; }
    nav { flex-wrap: wrap; gap: 8px; }
  }
</style>
</head>
<body>

<nav>
  <span class="nav-title">English Practice · <span class="nav-subtitle">I miei errori</span></span>
  <div class="score-pill">
    <span><span class="dot dot-g"></span><span id="nav-ok">0</span></span>
    <span><span class="dot dot-r"></span><span id="nav-ko">0</span></span>
    <span><span class="dot dot-o"></span><span id="nav-skip">0</span></span>
  </div>
</nav>

<div class="main" id="main-content">
  <!-- Populated by JS -->
</div>

<script>
// ── Dati dagli errori salvati in localStorage (stessa chiave dell'app principale) ──
let errorLog = JSON.parse(localStorage.getItem('ep_errors') || '[]');

// Session stats (non toccano quelle globali) — relative solo a questa sessione di ripasso
let sessionStats = { ok: 0, ko: 0, skip: 0 };
let deck = [];
let currentIdx = 0;
let answered = false;
let currentAudioText = '';
let currentSpeakBtn = null;

// ── Init ──
function init() {
  // Ricarica errori freschi dal localStorage
  errorLog = JSON.parse(localStorage.getItem('ep_errors') || '[]');
  // Filtra solo errori reali (non saltati)
  const errorWords = errorLog
    .filter(e => !e.skipped)
    .map(e => ({ it: e.it, base: e.base, past: e.past || null, part: e.part || null, type: e.type, count: e.count }));

  if (errorWords.length === 0) {
    showEmptyState();
    return;
  }

  // Ordine casuale, pesato per frequenza errori: le parole sbagliate più volte appaiono prima
  errorWords.sort((a, b) => b.count - a.count);
  deck = [...errorWords];
  currentIdx = 0;
  answered = false;
  sessionStats = { ok: 0, ko: 0, skip: 0 };
  renderQuiz();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── UI States ──
function showEmptyState() {
  document.getElementById('main-content').innerHTML = `
    <div class="empty-state">
      <span class="emoji">🎉</span>
      Nessun errore salvato ancora!<br><br>
      Torna qui dopo aver fatto un po' di pratica nell'<a href="index.html">app principale</a>.
    </div>`;
}

function renderQuiz() {
  const total = deck.length;
  document.getElementById('main-content').innerHTML = `
    <div class="quiz-controls">
      <span class="info-pill">Parole da ripassare: <strong>${total}</strong></span>
      <button class="btn" onclick="reshuffleDeck()">🔀 Mescola di nuovo</button>
      <button class="btn danger" onclick="if(confirm('Sei sicuro di voler eliminare tutti gli errori salvati?')) clearAllErrors()">🗑 Azzera errori</button>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
    <div id="quiz-card-wrap"></div>
    <a href="index.html" class="back-link">← Torna all'app principale</a>
  `;
  showWord();
}

function showWord() {
  updateProgress();
  updateNavScore();

  if (currentIdx >= deck.length) {
    showFinished();
    return;
  }

  answered = false;
  const w = deck[currentIdx];
  const isVerb = w.type === 'verb';
  const inputAttrs = 'autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text"';

  const fieldsHtml = isVerb
    ? `<div class="field-wrap"><div class="field-label">Base form</div><input class="field-input" id="f-base" placeholder="es. go" ${inputAttrs} onkeydown="handleKey(event)"></div>
       <div class="field-wrap"><div class="field-label">Past simple</div><input class="field-input" id="f-past" placeholder="es. went" ${inputAttrs} onkeydown="handleKey(event)"></div>
       <div class="field-wrap"><div class="field-label">Past participle</div><input class="field-input" id="f-part" placeholder="es. gone" ${inputAttrs} onkeydown="handleKey(event)"></div>`
    : `<div class="field-wrap"><input class="field-input" id="f-base" placeholder="Traduzione inglese..." ${inputAttrs} onkeydown="handleKey(event)"></div>`;

  document.getElementById('quiz-card-wrap').innerHTML = `
    <div class="card">
      <div class="error-badge">✗ ${w.count}× sbagliato</div>
      <div class="card-label">${isVerb ? 'Scrivi le tre forme del verbo' : 'Traduci in inglese'}</div>
      <div class="card-word-row">
        <div class="card-word">${w.it}</div>
        <button class="audio-btn" id="q-audio-btn" onclick="speakCurrent()" title="Ascolta risposta" style="display:none">
          <svg viewBox="0 0 16 16"><polygon points="3,2 13,8 3,14"/></svg>
        </button>
      </div>
      <div class="card-hint">${isVerb ? 'Base form · Past simple · Past participle' : ''}</div>
      <div class="fields-grid ${isVerb ? 'three' : 'one'}">${fieldsHtml}</div>
      <div class="answer-row">
        <div class="feedback-msg" id="feedback"></div>
        <button class="btn" id="skip-btn" type="button" onclick="skipWord()">Salta</button>
        <button class="btn primary" id="check-btn" type="button" onclick="checkAnswer()">Controlla</button>
        <button class="btn primary" id="next-btn" type="button" onclick="nextWord()" style="display:none">Avanti →</button>
      </div>
      <div id="correct-reveal"></div>
      <div id="fix-typo-area"></div>
    </div>
  `;

  currentAudioText = '';
  setTimeout(() => { const el = document.getElementById('f-base'); if (el) el.focus(); }, 100);
}

// ── Answer logic ──
function norm(s) { return s.trim().toLowerCase(); }

function chkMulti(userVal, correct) {
  const alternatives = correct.split(/[,/]/).map(a => norm(a.trim()));
  return alternatives.includes(norm(userVal));
}

function checkAnswer() {
  if (answered) return;
  const w = deck[currentIdx];
  const isVerb = w.type === 'verb';
  let allCorrect = true;
  const parts = [];

  function chk(id, correct) {
    const el = document.getElementById(id);
    if (!el) return;
    const ok = chkMulti(el.value, correct);
    el.classList.add(ok ? 'correct' : 'wrong');
    el.disabled = true;
    if (!ok) allCorrect = false;
    parts.push(correct);
  }
  chk('f-base', w.base);
  if (isVerb) { chk('f-past', w.past); chk('f-part', w.part); }

  answered = true;
  currentAudioText = parts.join(', ');
  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('skip-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'inline-block';
  document.getElementById('q-audio-btn').style.display = 'flex';

  if (allCorrect) {
    sessionStats.ok++;
    document.getElementById('feedback').textContent = '✓ Corretto!';
    document.getElementById('feedback').className = 'feedback-msg correct';
    speakCurrent();
    // Avanza automaticamente dopo 2 secondi
    setTimeout(() => { if (answered && currentIdx < deck.length) { currentIdx++; showWord(); } }, 2000);
  } else {
    sessionStats.ko++;
    document.getElementById('feedback').textContent = '✗ Sbagliato';
    document.getElementById('feedback').className = 'feedback-msg wrong';
    const rev = document.getElementById('correct-reveal');
    rev.innerHTML = isVerb
      ? `<div class="correct-answer">Risposta corretta: <strong>${w.base}</strong> · <strong>${w.past}</strong> · <strong>${w.part}</strong></div>`
      : `<div class="correct-answer">Risposta corretta: <strong>${w.base}</strong></div>`;

    document.getElementById('fix-typo-area').innerHTML = `
      <div class="fix-typo-wrap">
        <span class="fix-typo-label">Era un errore di battitura?</span>
        <button class="btn" onclick="markAsCorrect()" style="font-size:13px;padding:6px 12px;">✓ Segna come corretto</button>
      </div>`;
  }
  updateNavScore();
}

function markAsCorrect() {
  sessionStats.ko = Math.max(0, sessionStats.ko - 1);
  sessionStats.ok++;
  document.getElementById('feedback').textContent = '✓ Corretto!';
  document.getElementById('feedback').className = 'feedback-msg correct';
  document.getElementById('correct-reveal').innerHTML = '';
  document.getElementById('fix-typo-area').innerHTML = '';
  updateNavScore();
}

// ── Navigazione — Enter funziona sempre ──
function handleKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (!answered) {
      checkAnswer();
    } else {
      nextWord();
    }
  }
}

// Listener globale: Enter funziona anche dopo risposta sbagliata quando il focus è perso
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const active = document.activeElement;
    const isInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
    if (!isInput) {
      e.preventDefault();
      if (!answered) checkAnswer(); else nextWord();
    }
  }
});

function skipWord() { sessionStats.skip++; currentIdx++; showWord(); }
function nextWord() { currentIdx++; showWord(); }

function reshuffleDeck() {
  deck = shuffle(deck);
  currentIdx = 0;
  answered = false;
  sessionStats = { ok: 0, ko: 0, skip: 0 };
function showFinished() {
  const total = sessionStats.ok + sessionStats.ko;
  const pct = total ? Math.round(sessionStats.ok / total * 100) : 0;
  document.getElementById('quiz-card-wrap').innerHTML = `
    <div class="card finished-card">
      <span class="emoji">${pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚'}</span>
      <div class="title">Sessione completata!</div>
      <div class="subtitle">${sessionStats.ok} corrette · ${sessionStats.ko} sbagliate · ${sessionStats.skip} saltate · ${pct}% di precisione</div>
      <div class="actions">
        <button class="btn primary" onclick="reshuffleDeck()">🔀 Riprova mescolato</button>
        <button class="btn" onclick="restartFromTop()">↩ Ricomincia dall'inizio</button>
      </div>
    </div>
  `;
  document.getElementById('progress-bar').style.width = '100%';
}

function restartFromTop() {
  currentIdx = 0;
  answered = false;
  sessionStats = { ok: 0, ko: 0, skip: 0 };
function updateProgress() {
  const bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = (deck.length ? (currentIdx / deck.length) * 100 : 0) + '%';
}

function updateNavScore() {
  document.getElementById('nav-ok').textContent = sessionStats.ok;
  document.getElementById('nav-ko').textContent = sessionStats.ko;
  const skipEl = document.getElementById('nav-skip');
  if (skipEl) skipEl.textContent = sessionStats.skip;
}

function speakCurrent() {
  if (currentAudioText) speakText(currentAudioText, document.getElementById('q-audio-btn'));
}

function speakText(text, btn) {
  if (!btn) return;
  window.speechSynthesis.cancel();
  if (currentSpeakBtn) currentSpeakBtn.classList.remove('playing');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 0.9;
  const voices = window.speechSynthesis.getVoices();
  const femaleVoice = voices.find(v => v.lang === 'en-US' && /allison|female|samantha|karen|victoria|moira|fiona|serena|zira|susan|amy|emma|joanna|salli|kimberly|kendra/i.test(v.name))
    || voices.find(v => v.lang === 'en-GB' && /female|kate|amy/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en') && /female|samantha|karen/i.test(v.name))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (femaleVoice) u.voice = femaleVoice;
  btn.classList.add('playing');
  currentSpeakBtn = btn;
  u.onend = () => btn.classList.remove('playing');
  u.onerror = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}

function clearAllErrors() {
  localStorage.setItem('ep_errors', JSON.stringify([]));
  errorLog = [];
  showEmptyState();
}

// ── Start ──
window.speechSynthesis.onvoiceschanged = () => {};
init();
</script>
</body>
</html>
