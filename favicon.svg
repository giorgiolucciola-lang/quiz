<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="leftHalf"><rect x="0" y="0" width="32" height="64"/></clipPath>
    <clipPath id="rightHalf"><rect x="32" y="0" width="32" height="64"/></clipPath>
  </defs>

  <!-- ===== LEFT HALF: Union Jack (simplified) ===== -->
  <g clip-path="url(#leftHalf)">
    <rect x="0" y="0" width="64" height="64" fill="#00247d"/>
    <!-- white diagonals (St Andrew) -->
    <g stroke="#ffffff" stroke-width="11">
      <line x1="0" y1="0" x2="64" y2="64"/>
      <line x1="64" y1="0" x2="0" y2="64"/>
    </g>
    <!-- red diagonals (St Patrick), thinner, offset -->
    <g stroke="#cf142b" stroke-width="4.5">
      <line x1="0" y1="0" x2="64" y2="64"/>
      <line x1="64" y1="0" x2="6" y2="64" transform="translate(0,0)"/>
    </g>
    <!-- correct counterchanged red diagonals -->
    <g stroke="#cf142b" stroke-width="4.5">
      <line x1="3" y1="0" x2="64" y2="58"/>
      <line x1="61" y1="0" x2="0" y2="58"/>
    </g>
    <!-- white cross (St George base) -->
    <rect x="26" y="0" width="12" height="64" fill="#ffffff"/>
    <rect x="0" y="26" width="64" height="12" fill="#ffffff"/>
    <!-- red cross (St George) -->
    <rect x="28.5" y="0" width="7" height="64" fill="#cf142b"/>
    <rect x="0" y="28.5" width="64" height="7" fill="#cf142b"/>
  </g>

  <!-- ===== RIGHT HALF: Stars & Stripes (simplified, stripes only) ===== -->
  <g clip-path="url(#rightHalf)">
    <rect x="0" y="0" width="64" height="64" fill="#ffffff"/>
    <g fill="#b22234">
      <rect x="0" y="0"  width="64" height="6.4"/>
      <rect x="0" y="12.8" width="64" height="6.4"/>
      <rect x="0" y="25.6" width="64" height="6.4"/>
      <rect x="0" y="38.4" width="64" height="6.4"/>
      <rect x="0" y="51.2" width="64" height="6.4"/>
      <rect x="0" y="64" width="64" height="6.4" transform="translate(0,-6.4)"/>
      <rect x="0" y="57.6" width="64" height="6.4"/>
    </g>
  </g>

  <!-- subtle divider -->
  <rect x="31" y="0" width="2" height="64" fill="#000000" opacity="0.15"/>
</svg>
